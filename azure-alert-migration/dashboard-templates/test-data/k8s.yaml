apiVersion: v1
kind: Namespace
metadata:
  name: dashboard-template-validation
  labels:
    app.kubernetes.io/part-of: standard-dashboard-templates
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-template-test-data
  namespace: dashboard-template-validation
  labels:
    app.kubernetes.io/name: dashboard-template-test-data
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dashboard-template-test-data
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dashboard-template-test-data
        app.kubernetes.io/part-of: standard-dashboard-templates
    spec:
      containers:
        - name: generator
          image: dashboard-template-test-data:v1
          imagePullPolicy: IfNotPresent
          env:
            - name: PROMETHEUS_URL
              value: http://lgtm.lgtm.svc:9090
            - name: OTLP_HTTP_URL
              value: http://lgtm.lgtm.svc:4318
            - name: INTERVAL_SECONDS
              value: "15"
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
