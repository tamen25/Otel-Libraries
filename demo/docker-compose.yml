name: otel-demo

services:
  loki:
    image: grafana/loki:3.2.0
    command: -config.file=/etc/loki/config.yaml
    volumes:
      - ./loki/config.yaml:/etc/loki/config.yaml:ro
    ports:
      - "3100:3100"

  tempo:
    image: grafana/tempo:2.6.0
    command: -config.file=/etc/tempo/config.yaml
    volumes:
      - ./tempo/config.yaml:/etc/tempo/config.yaml:ro
    depends_on:
      - mimir

  mimir:
    image: grafana/mimir:2.14.0
    command:
      - -config.file=/etc/mimir/mimir.yaml
    volumes:
      - ./mimir/mimir.yaml:/etc/mimir/mimir.yaml:ro
    ports:
      - "9009:9009"

  alloy:
    image: grafana/alloy:v1.5.1
    command: ["run", "--storage.path=/var/lib/alloy/data", "--stability.level=experimental", "/etc/alloy/config.alloy"]
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
    ports:
      - "4318:4318"
    depends_on:
      - loki
      - tempo

  grafana:
    image: grafana/grafana:11.3.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - loki
      - tempo
      - mimir

  python-app:
    build:
      context: .
      dockerfile: apps/python/Dockerfile
    environment:
      OTEL_SERVICE_NAME: python-app
      OTEL_BACKEND_EXPORTERS: otel
      OTEL_LOG_LEVEL: ${DEMO_LOG_LEVEL:-info,warn,error,debug}
      OTEL_LOGS_SAMPLING_RATE: ${DEMO_SAMPLING_RATE:-100}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4318
      X_ORG_ID: ${DEMO_ORG_ID:-demo-org}
      JAVA_URL: http://java-app:8080/process
    restart: unless-stopped
    depends_on:
      - alloy

  java-app:
    build:
      context: ..
      dockerfile: demo/apps/java/Dockerfile
    environment:
      OTEL_SERVICE_NAME: java-app
      OTEL_BACKEND_EXPORTERS: otel
      OTEL_LOG_LEVEL: ${DEMO_LOG_LEVEL:-info,warn,error,debug}
      OTEL_LOGS_SAMPLING_RATE: ${DEMO_SAMPLING_RATE:-100}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4318
      X_ORG_ID: ${DEMO_ORG_ID:-demo-org}
      DOTNET_URL: http://dotnet-app:8081/finalize
    restart: unless-stopped
    depends_on:
      - alloy

  dotnet-app:
    build:
      context: .
      dockerfile: apps/dotnet/Dockerfile
    environment:
      OTEL_SERVICE_NAME: dotnet-app
      OTEL_BACKEND_EXPORTERS: otel
      OTEL_LOG_LEVEL: ${DEMO_LOG_LEVEL:-info,warn,error,debug}
      OTEL_LOGS_SAMPLING_RATE: ${DEMO_SAMPLING_RATE:-100}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4318
      X_ORG_ID: ${DEMO_ORG_ID:-demo-org}
    restart: unless-stopped
    depends_on:
      - alloy

  node-edge:
    build:
      context: .
      dockerfile: apps/node/Dockerfile
    environment:
      OTEL_SERVICE_NAME: node-edge
      OTEL_BACKEND_EXPORTERS: otel
      OTEL_LOG_LEVEL: ${DEMO_LOG_LEVEL:-info,warn,error,debug}
      OTEL_LOGS_SAMPLING_RATE: ${DEMO_SAMPLING_RATE:-100}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4318
      X_ORG_ID: ${DEMO_ORG_ID:-demo-org}
      PYTHON_URL: http://python-app:8000/order
    ports:
      - "8090:8090"
    restart: unless-stopped
    depends_on:
      - alloy
      - python-app

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "5173:80"
    restart: unless-stopped
    depends_on:
      - node-edge

  loadgen:
    build:
      context: .
      dockerfile: apps/loadgen/Dockerfile
    environment:
      TARGET: http://node-edge:8090/api/order
    restart: unless-stopped
    depends_on:
      - node-edge
