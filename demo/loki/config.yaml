auth_enabled: false

server:
  http_listen_port: 3100

common:
  instance_addr: 127.0.0.1
  path_prefix: /tmp/loki
  storage:
    filesystem:
      chunks_directory: /tmp/loki/chunks
      rules_directory: /tmp/loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # Promote service identity to an indexed label. `index_label` is only valid for
  # resource_attributes; log-record attributes (level/severity) become structured
  # metadata, and Loki auto-derives a `detected_level` label from log severity,
  # which is what the dashboards filter on.
  otlp_config:
    resource_attributes:
      attributes_config:
        - action: index_label
          attributes:
            - service_name
            - service.name
  allow_structured_metadata: true
  # Enable Loki's automatic detected_level label from OTLP severity.
  discover_log_levels: true
